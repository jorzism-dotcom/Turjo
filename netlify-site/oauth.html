<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SBM</title>
<style>
  body { display: none; background: #0a1628; color: #e2e8f0; font-family: sans-serif;
    align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; text-align: center; }
  .card { background: #0d1f3c; border: 1px solid #1e3a5f; border-radius: 16px; padding: 32px; max-width: 360px; width: 100%; }
  .spin { display: inline-block; animation: spin 1s linear infinite; font-size: 40px; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { margin: 0 0 8px; font-size: 18px; }
  p { color: #64748b; font-size: 14px; margin: 8px 0; }
  .success { color: #22c55e; }
  .error { color: #ef4444; }
</style>
</head>
<body>
<div class="card" id="card">
  <div id="icon" class="spin">◌</div>
  <h2 id="title">সংযুক্ত হচ্ছে...</h2>
  <p id="msg">Google Drive যাচাই করা হচ্ছে</p>
</div>
<script>
(function() {
  var REDIRECT_URI = "https://sbm-admin-mocha.vercel.app/oauth.html";
  var REFRESH_ENDPOINT = "https://sbm-admin-mocha.vercel.app/api/refresh-token";

  var search = window.location.search.slice(1);
  var hash   = window.location.hash.slice(1);
  var params = new URLSearchParams(search || hash);

  var code    = params.get("code");
  var token   = params.get("access_token"); // implicit flow fallback
  var state   = params.get("state");
  var error   = params.get("error");

  // ── Silent errors: চুপচাপ বন্ধ করো ─────────────────────────────────────
  var SILENT_ERRORS = ["interaction_required", "login_required", "consent_required", "access_denied"];
  if (error) {
    if (SILENT_ERRORS.indexOf(error) !== -1) {
      var silentLink = "com.protik.sbm://oauth2redirect#error="
        + encodeURIComponent(error) + "&state=" + encodeURIComponent(state || "");
      try { window.location.replace(silentLink); } catch(e) {}
      var closeAttempts = [
        function() { try { window.close(); } catch(e) {} },
        function() { try { history.go(-(history.length)); } catch(e) {} },
        function() { try { window.open("","_self").close(); } catch(e) {} },
      ];
      var ci = 0;
      var tryClose = setInterval(function() {
        if (ci < closeAttempts.length) { closeAttempts[ci](); ci++; }
        else { clearInterval(tryClose); }
      }, 300);
      return;
    }
    // অপ্রত্যাশিত error — দেখাও
    document.body.style.display = "flex";
    document.getElementById("icon").textContent = "❌";
    document.getElementById("icon").className = "";
    document.getElementById("title").textContent = "সংযোগ ব্যর্থ";
    document.getElementById("title").className = "error";
    document.getElementById("msg").textContent = "Error: " + error;
    return;
  }

  // ── Authorization Code flow (নতুন) ──────────────────────────────────────
  if (code) {
    document.body.style.display = "flex";
    document.getElementById("msg").textContent = "Token নেওয়া হচ্ছে...";

    fetch(REFRESH_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        grant_type: "authorization_code",
        code: code,
        redirect_uri: REDIRECT_URI,
      }),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.access_token) {
        throw new Error(data.error_description || data.error || "Token পাওয়া যায়নি");
      }

      // refresh_token থাকলে deep link-এ পাঠাও (App সংরক্ষণ করবে)
      var deepLink = "com.protik.sbm://oauth2redirect#access_token="
        + encodeURIComponent(data.access_token)
        + "&state=" + encodeURIComponent(state || "")
        + (data.refresh_token ? "&refresh_token=" + encodeURIComponent(data.refresh_token) : "")
        + (data.expires_in ? "&expires_in=" + data.expires_in : "");

      window.location.replace(deepLink);

      setTimeout(function() {
        document.getElementById("icon").textContent = "✅";
        document.getElementById("icon").className = "";
        document.getElementById("title").textContent = "সংযোগ সফল!";
        document.getElementById("title").className = "success";
        document.getElementById("msg").textContent = "SBM App খোলা না গেলে নিচে ট্যাপ করুন:";
        var link = document.createElement("a");
        link.href = deepLink;
        link.textContent = "📱 SBM App খুলুন";
        link.style.cssText = "display:block;margin-top:16px;padding:12px;background:#4285F4;color:#fff;border-radius:10px;text-decoration:none;font-weight:800;font-size:15px;";
        document.getElementById("card").appendChild(link);
      }, 2000);
    })
    .catch(function(err) {
      document.getElementById("icon").textContent = "❌";
      document.getElementById("icon").className = "";
      document.getElementById("title").textContent = "সংযোগ ব্যর্থ";
      document.getElementById("title").className = "error";
      document.getElementById("msg").textContent = err.message;
    });
    return;
  }

  // ── Implicit flow fallback (পুরনো token) ────────────────────────────────
  if (token) {
    document.body.style.display = "flex";
    var deepLink2 = "com.protik.sbm://oauth2redirect#access_token="
      + encodeURIComponent(token) + "&state=" + encodeURIComponent(state || "");
    window.location.replace(deepLink2);
    setTimeout(function() {
      document.getElementById("icon").textContent = "✅";
      document.getElementById("icon").className = "";
      document.getElementById("title").textContent = "সংযোগ সফল!";
      document.getElementById("title").className = "success";
      document.getElementById("msg").textContent = "SBM App খোলা না গেলে নিচে ট্যাপ করুন:";
      var link = document.createElement("a");
      link.href = deepLink2;
      link.textContent = "📱 SBM App খুলুন";
      link.style.cssText = "display:block;margin-top:16px;padding:12px;background:#4285F4;color:#fff;border-radius:10px;text-decoration:none;font-weight:800;font-size:15px;";
      document.getElementById("card").appendChild(link);
    }, 2000);
    return;
  }

  // কিছুই নেই — চুপচাপ বন্ধ
  try { window.close(); } catch(e) {}
})();
</script>
</body>
</html>
