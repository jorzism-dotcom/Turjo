name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── ফেজ ০: Firestore Emulator + Security Rules টেস্ট ──────────────────────
  # firestore.rules-এর বিরুদ্ধে আসল emulator চালিয়ে schema-validation টেস্ট
  # করে (tests/rules-tests.mjs)। এটা build জবের আগে চলে এবং build এর উপর
  # নির্ভরশীল (needs) — কেউ ভুল করে rules ঢিলা/ভাঙা করলে APK build-ই আটকে
  # যাবে, ভুল rules নিয়ে release বেরোবে না।
  firestore-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 21 — firebase-tools-এর নতুন ভার্সন এখন Java 21+ চায়, JDK 17-এ emulator চলে না)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔒 firestore.rules ↔ admin.html sync-check (drift থাকলে fail)
        run: npm run test:rules-sync

      - name: 🔥 Firestore Emulator rules টেস্ট (shape/schema validation)
        run: npm run test:rules

  build:
    runs-on: ubuntu-latest
    needs: firestore-rules
    permissions:
      contents: write   # 🔴 GitHub Release তৈরি + পুরনো release ডিলিট করার জন্য প্রয়োজন

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          # ডিফল্ট packages ('tools platform-tools')-এর মধ্যে legacy 'tools'
          # প্যাকেজ থাকে, যেটার ভেতর Android Emulator বান্ডল করা — APK বিল্ডে
          # emulator লাগে না, আর এই ডাউনলোডই মাঝে মাঝে করাপ্ট/টাইমআউট হয়ে পুরো
          # ধাপ fail করাচ্ছিল। শুধু platform-tools রাখলে emulator ডাউনলোড হয় না।
          # platforms/build-tools এখানে আলাদা করে বসানোর দরকার নেই — Gradle
          # বিল্ডের সময় AGP নিজেই android/app/build.gradle অনুযায়ী সঠিক
          # ভার্সন sdkmanager দিয়ে auto-download করে নেয় (license আগেই accept করা)।
          packages: 'platform-tools'

      - name: Install system dependencies for sharp
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          npm_config_sharp_libvips_binary_host: https://github.com/lovell/sharp-libvips/releases/download

      - name: 🔎 ESLint (fails build only on real bugs — no-undef, broken hooks, etc.; style warnings don't block)
        run: npm run lint

      - name: 🔬 Type-check (JSDoc + @ts-check, শুধু src/logic.js ও src/schemas.js — App.jsx আওতায় না)
        run: npm run typecheck

      - name: 🧪 Run logic + schema + integration tests (fails build if any core formula/flow is broken)
        run: npm test

      - name: 🔀 Fuzz tests (blocks build — see ENTERPRISE_MONITORING_PLAN.md ফেজ A/A1)
        # ২২ জুলাই ২০২৬: sandbox-এ ১০ বার আলাদাভাবে চালিয়ে (প্রতিবার ৯টা
        # property × ১০০০ random রান, fast-check-এর নিজস্ব randomness) সবসময়
        # green পাওয়া গেছে (দেখুন ENTERPRISE_MONITORING_PLAN.md ফেজ A / A1,
        # BUGFIX_LOG.md) — তাই continue-on-error সরিয়ে blocking করা হলো।
        # নোট: এই ১০ রান sandbox-এ (local Node) হয়েছে, GitHub Actions
        # runner-এ না — যেহেতু এই টেস্ট বিশুদ্ধ Node লজিক টেস্ট (কোনো
        # network/OS নির্ভরতা নেই), পরিবেশ-ভেদে ফলাফল বদলানোর কথা না, কিন্তু
        # merge-এর পর প্রথম আসল CI রান একবার চোখে দেখে নেওয়া উচিত।
        run: npm run test:fuzz

      - name: 🧬 Mutation score report (informational only — src/logic.js, does not block build)
        # ২২ জুলাই ২০২৬: sandbox baseline ৭২.৫৩% (দেখুন stryker.conf.json ও
        # ENTERPRISE_MONITORING_PLAN.md ফেজ A / A2)। ইচ্ছাকৃতভাবে
        # continue-on-error — শুধু দৃশ্যমান রিপোর্ট, এখনো build-gate না।
        run: npm run test:mutation
        continue-on-error: true

      - name: Bundle GSI client locally (Capacitor WebView fix)
        run: |
          # Download Google Identity Services script so Capacitor WebView
          # can load it without blocking accounts.google.com
          mkdir -p public
          curl -fsSL "https://accounts.google.com/gsi/client" -o public/gsi-client.js
          echo "✅ gsi-client.js bundled ($(wc -c < public/gsi-client.js) bytes)"

      - name: 🏷️ Compute semantic app version (auto — ম্যানুয়াল version বাম্প লাগবে না)
        run: |
          # প্রতিটা build স্বয়ংক্রিয়ভাবে একটা নতুন, সবসময়-বাড়তে-থাকা x.y.z ভার্সন
          # পায় — run_number কখনো কমে না়, তাই App.jsx-এর compareVersions()
          # সবসময় সঠিকভাবে কাজ করবে। শুরুর "1.0" অংশ শুধু বড় মাইলফলকে
          # (মেজর ফিচার রিলিজ) ইচ্ছে করলে হাতে বদলাতে পারেন — নাহলে কিছুই
          # ছোঁয়া লাগবে না, প্যাচ অংশ (শেষেরটা) সবসময় auto বাড়বে।
          APP_SEMVER="1.0.${{ github.run_number }}"
          echo "APP_SEMVER=$APP_SEMVER" >> "$GITHUB_ENV"
          echo "computed version: $APP_SEMVER"

      - name: Build web assets
        run: |
          # 🔴 App.jsx-এর APP_BUILD এই ভ্যালু import.meta.env.VITE_BUILD_ID
          # থেকে পড়ে — প্রতি বিল্ডে UTC টাইমস্ট্যাম্প + কমিট SHA আলাদা হওয়ায়
          # Settings-এ অ্যাপ ভার্সন কার্ডে স্বয়ংক্রিয়ভাবে নতুন মান দেখাবে,
          # ম্যানুয়ালি v1-dbgN বাড়ানো লাগবে না।
          export VITE_BUILD_ID="$(date -u +%Y%m%d-%H%M)-${GITHUB_SHA::7}-run${GITHUB_RUN_NUMBER}"
          # 🔴 App.jsx-এর APP_VERSION_CODE এখন এই VITE_APP_VERSION থেকে পড়ে —
          # admin.html-এর সাথে সেমান্টিক (x.y.z) কম্পেয়ারের জন্য এটাই সোর্স অফ ট্রুথ।
          export VITE_APP_VERSION="$APP_SEMVER"
          echo "VITE_BUILD_ID=$VITE_BUILD_ID"
          echo "VITE_APP_VERSION=$VITE_APP_VERSION"
          npm run build

      - name: Copy gsi-client.js to dist (Vite public dir fix)
        run: |
          cp public/gsi-client.js dist/gsi-client.js
          echo "✅ gsi-client.js copied to dist/ ($(wc -c < dist/gsi-client.js) bytes)"

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android already exists, skipping"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Install sharp (SVG→PNG converter)
        run: npm install sharp --save-dev --legacy-peer-deps

      - name: Generate icon foreground PNG
        run: |
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const svg = \`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96' width='1024' height='1024'>
            <defs>
              <radialGradient id='core' cx='50%' cy='50%' r='50%'>
                <stop offset='0%' stop-color='#00e5ff' stop-opacity='0.45'/>
                <stop offset='100%' stop-color='#00e5ff' stop-opacity='0'/>
              </radialGradient>
              <filter id='glow' x='-40%' y='-40%' width='180%' height='180%'>
                <feGaussianBlur stdDeviation='1.5' result='b'/>
                <feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge>
              </filter>
            </defs>
            <ellipse cx='48' cy='48' rx='42' ry='18' fill='none' stroke='#00e5ff' stroke-width='0.8' stroke-dasharray='4 3' stroke-opacity='0.45'/>
            <ellipse cx='48' cy='48' rx='42' ry='18' fill='none' stroke='#00e5ff' stroke-width='0.8' stroke-dasharray='4 3' stroke-opacity='0.45' transform='rotate(60 48 48)'/>
            <ellipse cx='48' cy='48' rx='42' ry='18' fill='none' stroke='#00e5ff' stroke-width='0.8' stroke-dasharray='4 3' stroke-opacity='0.45' transform='rotate(-60 48 48)'/>
            <polygon points='48,26 64,36 64,56 48,66 32,56 32,36' fill='none' stroke='#00e5ff' stroke-width='1.5' stroke-opacity='0.85'/>
            <circle cx='48' cy='46' r='14' fill='url(#core)'/>
            <text x='48' y='52' font-family='monospace' font-size='14' font-weight='900' fill='white' text-anchor='middle' filter='url(#glow)'>SBM</text>
            <circle cx='48' cy='4' r='2.5' fill='#00e5ff' opacity='0.9'/>
            <circle cx='48' cy='92' r='3' fill='#00e5ff' opacity='0.9'/>
            <circle cx='4' cy='48' r='3' fill='#00e5ff' opacity='0.9'/>
            <circle cx='92' cy='48' r='3' fill='#00e5ff' opacity='0.9'/>
          </svg>\`;
          fs.mkdirSync('assets', { recursive: true });
          sharp(Buffer.from(svg)).resize(1024,1024).png().toFile('assets/icon-foreground.png')
            .then(()=>console.log('done')).catch(e=>{console.error(e);process.exit(1);});
          "

      - name: Generate icon background PNG
        run: |
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const bg = \`<svg xmlns='http://www.w3.org/2000/svg' width='1024' height='1024'>
            <defs>
              <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
                <stop offset='0%' stop-color='#001a2c'/>
                <stop offset='100%' stop-color='#003344'/>
              </linearGradient>
            </defs>
            <rect width='1024' height='1024' fill='url(#bg)'/>
          </svg>\`;
          sharp(Buffer.from(bg)).resize(1024,1024).png().toFile('assets/icon-background.png')
            .then(()=>console.log('done')).catch(e=>{console.error(e);process.exit(1);});
          "

      - name: Generate splash PNG
        run: |
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const splash = \`<svg xmlns='http://www.w3.org/2000/svg' width='2732' height='2732'>
            <defs>
              <radialGradient id='sg' cx='50%' cy='40%' r='60%'>
                <stop offset='0%' stop-color='#001a2c'/>
                <stop offset='100%' stop-color='#000d18'/>
              </radialGradient>
            </defs>
            <rect width='2732' height='2732' fill='url(#sg)'/>
          </svg>\`;
          sharp(Buffer.from(splash)).resize(2732,2732).png().toFile('assets/splash.png')
            .then(()=>console.log('done')).catch(e=>{console.error(e);process.exit(1);});
          "

      - name: Install Capacitor Assets
        run: npm install @capacitor/assets --save-dev --legacy-peer-deps

      - name: Generate all Android icon sizes
        run: npx capacitor-assets generate --android

      - name: Add notification status bar icon (ic_stat_pulse)
        run: |
          mkdir -p "android/app/src/main/res/drawable-mdpi"
          echo "" | base64 --decode > "android/app/src/main/res/drawable-mdpi/ic_stat_pulse.png"
          mkdir -p "android/app/src/main/res/drawable-hdpi"
          echo "" | base64 --decode > "android/app/src/main/res/drawable-hdpi/ic_stat_pulse.png"
          mkdir -p "android/app/src/main/res/drawable-xhdpi"
          echo "" | base64 --decode > "android/app/src/main/res/drawable-xhdpi/ic_stat_pulse.png"
          mkdir -p "android/app/src/main/res/drawable-xxhdpi"
          echo "" | base64 --decode > "android/app/src/main/res/drawable-xxhdpi/ic_stat_pulse.png"
          mkdir -p "android/app/src/main/res/drawable-xxxhdpi"
          echo "" | base64 --decode > "android/app/src/main/res/drawable-xxxhdpi/ic_stat_pulse.png"
          echo "✅ ic_stat_pulse.png সব ডেনসিটিতে যোগ হয়েছে"

      - name: Add google-services.json
        run: |
          mkdir -p android/app
          cp google-services.json android/app/google-services.json

      - name: Add Google Auth server_client_id to strings.xml
        run: |
          mkdir -p android/app/src/main/res/values
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ ! -f "$STRINGS_FILE" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><resources></resources>' > "$STRINGS_FILE"
          fi
          # server_client_id = Web Application OAuth Client ID (from google-services.json)
          WEB_CLIENT_ID=$(python3 -c "
          import json
          with open('google-services.json') as f:
            d = json.load(f)
          clients = d.get('client', [])
          for c in clients:
            for oc in c.get('oauth_client', []):
              if oc.get('client_type') == 3:
                print(oc['client_id'])
                break
          " 2>/dev/null || echo "")
          if [ -n "$WEB_CLIENT_ID" ]; then
            if ! grep -q "server_client_id" "$STRINGS_FILE"; then
              sed -i 's|</resources>|    <string name="server_client_id">'"$WEB_CLIENT_ID"'</string>\n</resources>|' "$STRINGS_FILE"
            fi
            echo "✅ server_client_id added: $WEB_CLIENT_ID"
          else
            echo "⚠️ No web client ID found in google-services.json"
          fi

      - name: Add Firebase dependencies to build.gradle
        run: |
          sed -i '/dependencies {/a\        classpath '"'"'com.google.firebase:firebase-crashlytics-gradle:2.9.9'"'"'' android/build.gradle
          sed -i '/apply plugin: '"'"'com.android.application'"'"'/a\apply plugin: '"'"'com.google.gms.google-services'"'"'' android/app/build.gradle
          sed -i '/dependencies {/a\    implementation platform('"'"'com.google.firebase:firebase-bom:32.7.0'"'"')' android/app/build.gradle
          sed -i '/implementation platform.*firebase-bom/a\    implementation '"'"'com.google.firebase:firebase-messaging'"'"'' android/app/build.gradle

      - name: Add permissions to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <application|' "$MANIFEST"
          fi
          if ! grep -q "SCHEDULE_EXACT_ALARM" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <application|' "$MANIFEST"
          fi
          if ! grep -q "BLUETOOTH_CONNECT" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.BLUETOOTH"/>\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>\n    <application|' "$MANIFEST"
          fi
          if ! grep -q "WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <application|' "$MANIFEST"
          fi
          if ! grep -q "MANAGE_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>\n    <application|' "$MANIFEST"
          fi
          # REQUEST_INSTALL_PACKAGES — Android 8+ ছাড়া এই পারমিশন app-এর
          # নিজের APK ইনস্টলার (FileOpener দিয়ে খোলা) সিস্টেম চুপচাপ ব্লক করে
          # দেয় বা AndroidManifest-এ declare না থাকলে PackageInstaller
          # activity resolve-ই হয় না — তখন FileOpener.open() ব্যর্থ হয়ে
          # ধরা পড়ে এবং কোড Share.share() ফলব্যাকে চলে যায় (generic Share
          # শীট, ইনস্টলার না) — এটাই ছিল আসল রুট-কজ।
          if ! grep -q "REQUEST_INSTALL_PACKAGES" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"/>\n    <application|' "$MANIFEST"
            echo "✅ REQUEST_INSTALL_PACKAGES permission added"
          fi
          # ক্যামেরা পারমিশন — স্টাফ সেটআপ QR স্ক্যান ফিচারের জন্য
          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n    <application|' "$MANIFEST"
            echo "✅ CAMERA permission added (QR scan feature)"
          fi
          # FileProvider — PDF ফাইল WhatsApp-এ শেয়ার করার জন্য
          if ! grep -q "FileProvider" "$MANIFEST"; then
            sed -i 's|</application>|    <provider\n            android:name="androidx.core.content.FileProvider"\n            android:authorities="com.protik.sbm.fileprovider"\n            android:exported="false"\n            android:grantUriPermissions="true">\n            <meta-data\n                android:name="android.support.FILE_PROVIDER_PATHS"\n                android:resource="@xml/file_paths"/>\n        </provider>\n    </application>|' "$MANIFEST"
            echo "✅ FileProvider added"
          fi
          mkdir -p android/app/src/main/res/xml
          if [ ! -f android/app/src/main/res/xml/file_paths.xml ]; then
            printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<paths>' '    <external-path name="external_files" path="." />' '    <cache-path name="cache_files" path="." />' '    <files-path name="files" path="." />' '    <external-cache-path name="external_cache" path="." />' '</paths>' > android/app/src/main/res/xml/file_paths.xml
            echo "✅ file_paths.xml created"
          fi
          # OAuth deep link intent filter — com.protik.sbm://oauth2redirect
          if ! grep -q "sbm_oauth" "$MANIFEST"; then
            sed -i 's|</activity>|        <intent-filter android:label=\"sbm_oauth\">\n                <action android:name=\"android.intent.action.VIEW\"/>\n                <category android:name=\"android.intent.category.DEFAULT\"/>\n                <category android:name=\"android.intent.category.BROWSABLE\"/>\n                <data android:scheme=\"com.protik.sbm\" android:host=\"oauth2redirect\"/>\n            </intent-filter>\n        </activity>|' "$MANIFEST"
          else
            sed -i 's|android:scheme="com.protik.sbm" android:host="[^"]*"|android:scheme="com.protik.sbm" android:host="oauth2redirect"|' "$MANIFEST"
          fi

      - name: Set versionCode from run number
        run: |
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          echo "versionCode = $VERSION_CODE"

      - name: Print SHA-1 fingerprint
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/temp.jks
          keytool -list -v -keystore /tmp/temp.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" 2>/dev/null | grep "SHA1:"
          rm /tmp/temp.jks

      - name: Decode Keystore from Secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.jks

      - name: Build Release APK (signed)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=$(pwd)/app/my-release-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sbm-apk-v${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: 📦 Rename signed APK (version নাম দিয়ে)
        run: |
          mkdir -p release-out
          cp android/app/build/outputs/apk/release/app-release.apk "release-out/SBM-v${APP_SEMVER}.apk"

      - name: 🚀 GitHub Release তৈরি করা (APK পাবলিক ডাউনলোড লিংক সহ)
        # 🔴 admin.html-এর Update ট্যাব এই Release-গুলো GitHub API দিয়ে পড়ে
        # (jorzism-dotcom/Turjo/releases) — version + APK লিংক auto-fill হয়,
        # ম্যানুয়ালি টাইপ করা লাগে না। Publish করা না হওয়া পর্যন্ত কোনো দোকানে
        # কিছু যায় না — এটা শুধু APK-টা GitHub-এ রেডি করে রাখে।
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_SEMVER }}
          name: SBM v${{ env.APP_SEMVER }}
          body: |
            Auto-built from commit ${{ github.sha }} (run #${{ github.run_number }})
            admin.html → Update ট্যাব → "GitHub রিলিজ থেকে আনুন" দিয়ে এই ভার্সন বেছে প্রকাশ করুন।
          files: release-out/SBM-v${{ env.APP_SEMVER }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 পুরনো/টেস্ট রিলিজ পরিষ্কার (সর্বশেষ ১৫টা রেখে বাকি ডিলিট)
        run: |
          gh release list --limit 200 --json tagName --jq '.[].tagName' | tail -n +16 | while read -r tag; do
            echo "Deleting old release: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
