name: Generate Keystore (একবারই চালান)

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: 'Keystore Password (মনে রাখুন!)'
        required: true
        default: 'sbm@12345'
      key_alias:
        description: 'Key Alias'
        required: true
        default: 'sbmkey'
      key_password:
        description: 'Key Password (store password-এর মতোই দিন)'
        required: true
        default: 'sbm@12345'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -keystore my-release-key.jks \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=SBM App, OU=Dev, O=SBM, L=Dhaka, S=Dhaka, C=BD"
          echo "Keystore তৈরি হয়েছে"

      - name: Convert to Base64
        run: |
          base64 -w 0 my-release-key.jks > keystore-base64.txt

      - name: Upload Keystore files
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            my-release-key.jks
            keystore-base64.txt
          retention-days: 1
