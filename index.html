<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#050d1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>SBM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Optimized: শুধু Noto Sans Bengali (Inter বাদ — system font fallback) -->
    <!-- display=swap: font লোডের আগেই text দেখাবে (faster LCP) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html {
        height: 100%;
        height: 100dvh;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }
      body {
        font-family: 'Noto Sans Bengali', 'Hind Siliguri', sans-serif; font-weight: 700;
        background: #050d1a;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        position: fixed;
        width: 100%;
      }
      #root {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* ── Quantum Core Splash ─────────────────────────── */
      #splash {
        position: fixed; inset: 0;
        background: radial-gradient(ellipse at 50% 40%, #001a2c 0%, #000d18 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px; z-index: 9999;
        transition: opacity 0.5s cubic-bezier(0.4,0,0.2,1);
      }
      #splash .logo-wrap {
        position: relative;
        width: 110px; height: 110px;
        display: flex; align-items: center; justify-content: center;
      }
      #splash .logo-wrap svg {
        animation: logoFloat 3s ease-in-out infinite;
        filter: drop-shadow(0 0 18px rgba(0,229,255,0.45));
        z-index: 1;
      }
      #splash .logo-ring {
        position: absolute; inset: -8px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #00e5ff;
        border-right-color: rgba(0,229,255,0.15);
        animation: sp 1.2s cubic-bezier(0.4,0,0.6,1) infinite;
      }
      #splash .logo-ring2 {
        position: absolute; inset: -16px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-top-color: rgba(0,229,255,0.4);
        animation: sp 2s cubic-bezier(0.4,0,0.6,1) infinite reverse;
      }
      #splash .app-name {
        color: #e0f9ff;
        font-size: 20px; font-weight: 800;
        letter-spacing: 5px;
        font-family: 'Courier New', monospace;
        text-shadow: 0 0 30px rgba(0,229,255,0.5);
      }
      #splash p {
        color: rgba(0,229,255,0.6);
        font-size: 13px;
        font-family: 'Noto Sans Bengali', 'Hind Siliguri', sans-serif;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes sp { to { transform: rotate(360deg); } }
      @keyframes logoFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      /* ── Global Scrollbar ────────────────────────────── */
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #38bdf833; border-radius: 10px; }

      /* ── Safe Area Support ───────────────────────────── */
      .safe-top    { padding-top: env(safe-area-inset-top, 0px); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
          <defs>
            <linearGradient id="sp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#001a2c"/>
              <stop offset="100%" stop-color="#003344"/>
            </linearGradient>
            <radialGradient id="sp-core" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
            </radialGradient>
            <filter id="sp-glow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="1.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width="96" height="96" rx="21" fill="url(#sp-bg)"/>
          <rect width="96" height="96" rx="21" fill="none" stroke="#00e5ff" stroke-width="0.7" stroke-opacity="0.35"/>
          <ellipse cx="48" cy="48" rx="42" ry="18" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.45"/>
          <ellipse cx="48" cy="48" rx="42" ry="18" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.45" transform="rotate(60 48 48)"/>
          <ellipse cx="48" cy="48" rx="42" ry="18" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="4 3" stroke-opacity="0.45" transform="rotate(-60 48 48)"/>
          <polygon points="48,26 64,36 64,56 48,66 32,56 32,36" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.85"/>
          <circle cx="48" cy="46" r="12" fill="url(#sp-core)"/>
          <text x="48" y="51" font-family="'Courier New',monospace" font-size="13" font-weight="900" fill="white" text-anchor="middle" filter="url(#sp-glow)">SBM</text>
          <circle cx="48" cy="8"  r="2.5" fill="#00e5ff" opacity="0.8"/>
          <circle cx="48" cy="88" r="2.5" fill="#00e5ff" opacity="0.8"/>
          <circle cx="8"  cy="48" r="2.5" fill="#00e5ff" opacity="0.8"/>
          <circle cx="88" cy="48" r="2.5" fill="#00e5ff" opacity="0.8"/>
        </svg>
        <div class="logo-ring"></div>
        <div class="logo-ring2"></div>
      </div>
      <div class="app-name">SBM</div>
      <p>লোড হচ্ছে...</p>
    </div>
    <div id="root"></div>
    <script>
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) {
          s.style.opacity = '0';
          setTimeout(function(){ s.style.display = 'none'; }, 500);
        }
      };
    </script>
    <!-- GSI client locally bundled — Capacitor WebView blocks accounts.google.com -->
    <script src="/gsi-client.js" async defer></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
